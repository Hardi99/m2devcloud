workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

stages:
  - lint
  - build
  - deploy

variables:
  FUNCTIONS_PATH: "src/functions/worker"
  FRONT_IMAGE: cloud-doc-frontend
  API_IMAGE: cloud-doc-api

# ─── LINT ────────────────────────────────────────────────────────────────────

lint-functions:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install --quiet -r $FUNCTIONS_PATH/requirements.txt
    - pip install --quiet flake8
    - flake8 $FUNCTIONS_PATH/function_app.py --max-line-length=120

lint-frontend:
  stage: lint
  image: node:22-alpine
  script:
    - cd src/front
    - npm install
    - npm run lint

# ─── BUILD ───────────────────────────────────────────────────────────────────

build-frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login "$ACR_LOGIN_SERVER" -u "$ACR_USERNAME" -p "$ACR_PASSWORD"
    - |
      docker build \
        --build-arg VITE_API_URL="$VITE_API_URL" \
        --build-arg VITE_FUNCTIONS_URL="$VITE_FUNCTIONS_URL" \
        -t "$ACR_LOGIN_SERVER/$FRONT_IMAGE:$CI_COMMIT_SHA" \
        -t "$ACR_LOGIN_SERVER/$FRONT_IMAGE:latest" \
        ./src/front
    - docker push "$ACR_LOGIN_SERVER/$FRONT_IMAGE:$CI_COMMIT_SHA"
    - docker push "$ACR_LOGIN_SERVER/$FRONT_IMAGE:latest"

build-api:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login "$ACR_LOGIN_SERVER" -u "$ACR_USERNAME" -p "$ACR_PASSWORD"
    - |
      docker build \
        -t "$ACR_LOGIN_SERVER/$API_IMAGE:$CI_COMMIT_SHA" \
        -t "$ACR_LOGIN_SERVER/$API_IMAGE:latest" \
        ./src/api
    - docker push "$ACR_LOGIN_SERVER/$API_IMAGE:$CI_COMMIT_SHA"
    - docker push "$ACR_LOGIN_SERVER/$API_IMAGE:latest"

# ─── DEPLOY ──────────────────────────────────────────────────────────────────

deploy-functions:
  stage: deploy
  image: mcr.microsoft.com/azure-cli
  script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID" --output none
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"
    - |
      cd "$FUNCTIONS_PATH"
      python3 -c "
      import zipfile, os
      with zipfile.ZipFile('/tmp/function.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
          for root, dirs, files in os.walk('.'):
              for f in files:
                  zf.write(os.path.join(root, f))
      "
    - |
      az functionapp deployment source config-zip \
        --resource-group "$AZURE_RESOURCE_GROUP" \
        --name "$AZURE_FUNCTION_APP_NAME" \
        --src /tmp/function.zip \
        --build-remote true

deploy-frontend:
  stage: deploy
  image: mcr.microsoft.com/azure-cli
  needs:
    - job: build-frontend
  script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID" --output none
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"
    - |
      az webapp config container set \
        --name "tabuna-front" \
        --resource-group "$AZURE_WEB_APP_RESOURCE_GROUP" \
        --container-image-name "$ACR_LOGIN_SERVER/$FRONT_IMAGE:$CI_COMMIT_SHA" \
        --container-registry-url "https://$ACR_LOGIN_SERVER" \
        --container-registry-user "$ACR_USERNAME" \
        --container-registry-password "$ACR_PASSWORD"

deploy-api:
  stage: deploy
  image: mcr.microsoft.com/azure-cli
  needs:
    - job: build-api
  script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID" --output none
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"
    - |
      az webapp config container set \
        --name "tabuna-api" \
        --resource-group "$AZURE_WEB_APP_RESOURCE_GROUP" \
        --container-image-name "$ACR_LOGIN_SERVER/$API_IMAGE:$CI_COMMIT_SHA" \
        --container-registry-url "https://$ACR_LOGIN_SERVER" \
        --container-registry-user "$ACR_USERNAME" \
        --container-registry-password "$ACR_PASSWORD"
