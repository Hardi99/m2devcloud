name: Frontend Deploy to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "src/front/**"
      - ".github/workflows/front-deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/front/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/front

      - name: Build
        run: npm run build
        working-directory: src/front
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONT_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONT_PUBLISH_PROFILE }}
          package: src/front/dist
